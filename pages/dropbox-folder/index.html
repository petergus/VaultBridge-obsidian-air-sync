<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline' https://www.dropbox.com https://cfl.dropboxstatic.com; style-src 'unsafe-inline'; connect-src https://www.dropbox.com https://*.dropbox.com https://*.dropboxstatic.com; img-src https://www.dropbox.com https://*.dropboxstatic.com data:; frame-src https://www.dropbox.com;"
    />
    <!--
      Dropbox Chooser host for Air Sync. The plugin opens this page in the browser
      (it can't load the remote dropins.js inside Obsidian), the user picks a
      folder, and we bounce the result to obsidian://air-sync-folder — like
      ../callback/, but on its own scheme (folder pick is not an auth flow).

      The Chooser browses the WHOLE Dropbox and cannot be limited to the app
      folder, but Air Sync uses App Folder scope: it can only sync a folder under
      Apps/Air Sync/. The plugin verifies the selection is reachable and rejects
      anything outside the app folder, so guide users to pick there.

      Requires, in the Dropbox App Console: the Chooser/Drop-ins enabled and this
      page's domain (airsync.takezo.dev) added to the Chooser domain allowlist —
      otherwise the Chooser shows "App is misconfigured".
    -->
    <script
      src="https://www.dropbox.com/static/api/2/dropins.js"
      id="dropboxjs"
      data-app-key="REPLACE_WITH_DROPBOX_APP_KEY"
    ></script>
    <title>Air Sync - Choose Dropbox folder</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 480px;
        margin: 80px auto;
        padding: 0 20px;
        color: #333;
        text-align: center;
      }
      h1 {
        font-size: 1.4rem;
      }
      .message {
        margin: 24px 0;
        line-height: 1.6;
      }
      .hint {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 24px;
      }
      .error {
        color: #c0392b;
      }
      button {
        font-size: 1rem;
        padding: 10px 24px;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #6d28d9;
      }
    </style>
  </head>
  <body>
    <h1>Air Sync for Obsidian</h1>
    <p class="hint">
      Choose the folder to sync. It must be inside <b>Apps/Air Sync/</b> — folders
      elsewhere can't be synced and will be rejected.
    </p>
    <div id="content">
      <button id="choose" type="button">Choose folder in Dropbox</button>
    </div>

    <script>
      (function () {
        var REDIRECT_BASE = "obsidian://air-sync-folder";
        var params = new URLSearchParams(window.location.search);
        var state = params.get("state") || "";
        var content = document.getElementById("content");

        // Static (no dynamic data) messages only — safe as innerHTML.
        function showMessage(text, isError) {
          content.innerHTML =
            '<p class="message' + (isError ? " error" : "") + '"></p>';
          content.firstChild.textContent = text;
        }

        // A button + handler built via DOM, never string-concatenated HTML, so the
        // (attacker-influenceable) redirect URL never enters an HTML/attribute
        // parsing context. encodeURIComponent does NOT escape ' / ( ), so building
        // an onclick="…'+url+'…" attribute would be XSS-able via a folder name or
        // the state query param.
        function showButton(label, onClick) {
          content.replaceChildren();
          var btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = label;
          btn.addEventListener("click", onClick);
          content.appendChild(btn);
        }

        document.getElementById("choose").addEventListener("click", function () {
          if (!window.Dropbox || !window.Dropbox.choose) {
            showMessage("Dropbox Chooser failed to load. Please try again.", true);
            return;
          }
          window.Dropbox.choose({
            folderselect: true,
            multiselect: false,
            linkType: "preview",
            success: function (items) {
              var item = items && items[0];
              if (!item) {
                showMessage("No folder was selected.", true);
                return;
              }
              var redirect =
                REDIRECT_BASE +
                "?id=" + encodeURIComponent(item.id) +
                "&name=" + encodeURIComponent(item.name || "") +
                "&state=" + encodeURIComponent(state);
              showButton("Open Obsidian", function () {
                window.location.href = redirect;
              });
              window.location.href = redirect;
            },
            cancel: function () {
              showButton("Choose folder in Dropbox", function () {
                window.location.reload();
              });
            },
          });
        });
      })();
    </script>
  </body>
</html>
