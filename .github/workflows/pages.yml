name: Deploy pages site

on:
    push:
        branches: ["main"]
        paths:
            - "pages/**"
            - ".github/workflows/pages.yml"
    workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to GitHub Pages.
permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment; never cancel an in-progress one.
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v6
            # The custom domain (airsync.takezo.dev) is intentionally NOT enabled
            # yet: drop the CNAME so this deploy serves from the default
            # <owner>.github.io/<repo>/ URL and does not claim the domain that the
            # air-sync-auth repo still holds. To switch the domain over later,
            # remove this step and set the domain in Settings > Pages.
            - name: Drop CNAME (custom domain not enabled yet)
              run: rm -f pages/CNAME
            - name: Configure Pages
              uses: actions/configure-pages@v5
              with:
                  # Enable Pages (source = GitHub Actions) on the first run so no
                  # manual Settings step is needed.
                  enablement: true
            - name: Upload pages/ as the Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: pages
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
